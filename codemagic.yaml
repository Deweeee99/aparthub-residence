workflows:
  ios-testflight-internal:
    name: ApartHub iOS TestFlight Internal
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: momnjo

    environment:
      flutter: 3.44.0
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.globalagraripta.aparthub.residence

    scripts:
      - name: Set up iOS signing
        script: |
          xcode-project use-profiles \
            --custom-export-options='{"testFlightInternalTestingOnly": true}'

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build ApartHub IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

      - name: Verify IPA artifact
        script: |
          ls -lah build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration